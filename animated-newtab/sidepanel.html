<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Liv</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    #canvas-container { position: fixed; inset: 0; }
    #canvas-container canvas { display: block; position: absolute; inset: 0; }
    #fade-overlay {
      position: fixed; inset: 0; background: #000; pointer-events: none;
      transition: opacity 0.5s ease; z-index: 5;
    }
  </style>
</head>
<body>
  <div id="canvas-container"></div>
  <div id="fade-overlay"></div>

  <script src="js/storage.js"></script>
  <script src="js/themes/engine.js"></script>
  <script src="js/themes/starfield.js"></script>
  <script src="js/themes/nebula.js"></script>
  <script src="js/themes/galaxy.js"></script>
  <script src="js/themes/aurora.js"></script>
  <script src="js/themes/particles.js"></script>
  <script src="js/sidepanel.js"></script>
</body>
</html>
