<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Tab</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <div id="canvas-container"></div>
  <div id="fade-overlay"></div>

  <main id="main-ui" aria-label="New tab page">

    <div id="header">
      <div id="header-logo">
        <div class="wordmark">LIV</div>
      </div>
      <div id="header-time" hidden>
        <div class="time-row">
          <span id="clock-hm">--:--</span><span id="clock-s" class="clock-sub">:--</span><span id="clock-ampm" class="clock-sub"> --</span>
        </div>
        <div id="clock-date-line"></div>
      </div>
      <div id="header-date" hidden>
        <div id="date-weekday"></div>
        <div id="date-line">
          <span id="date-time-small" hidden></span>
          <span id="date-separator" hidden>·</span>
          <span id="date-full"></span>
        </div>
      </div>
    </div>

    <div id="search-container">
      <input
        id="search-input"
        type="text"
        placeholder="Search…"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="off"
        spellcheck="false"
        aria-label="Search"
      >
    </div>

    <div id="quick-links" role="list" aria-label="Quick links"></div>

  </main>


  <button id="settings-btn" aria-label="Open settings" title="Settings">
    <svg width="18" height="18" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <path d="M10 12.5a2.5 2.5 0 100-5 2.5 2.5 0 000 5z" fill="currentColor"/>
      <path fill-rule="evenodd" clip-rule="evenodd" d="M8.257 1.566a1.75 1.75 0 013.486 0l.171.822a6.513 6.513 0 011.388.573l.734-.454a1.75 1.75 0 012.457 2.457l-.454.734c.23.44.42.906.573 1.388l.822.171a1.75 1.75 0 010 3.486l-.822.171a6.513 6.513 0 01-.573 1.388l.454.734a1.75 1.75 0 01-2.457 2.457l-.734-.454a6.512 6.512 0 01-1.388.573l-.171.822a1.75 1.75 0 01-3.486 0l-.171-.822a6.512 6.512 0 01-1.388-.573l-.734.454a1.75 1.75 0 01-2.457-2.457l.454-.734A6.512 6.512 0 013.39 11.4l-.822-.171a1.75 1.75 0 010-3.486l.822-.171A6.512 6.512 0 013.963 6.18l-.454-.734a1.75 1.75 0 012.457-2.457l.734.454a6.512 6.512 0 011.388-.573l.17-.822zM10 13.5a3.5 3.5 0 100-7 3.5 3.5 0 000 7z" fill="currentColor"/>
    </svg>
  </button>

  <div id="settings-overlay" class="hidden" role="dialog" aria-modal="true" aria-label="Settings">
    <div id="settings-panel" aria-hidden="true">

      <div class="settings-view" id="view-main" data-view="main">
      <div class="settings-header">
        <span class="settings-title">Settings</span>
        <button class="settings-close" type="button" aria-label="Close settings">✕</button>
      </div>

      <div class="settings-body">

        <section class="settings-section" data-section="appearance">
          <button class="section-toggle" type="button" aria-expanded="true">
            <span>Appearance</span>
            <svg class="chevron" width="12" height="12" viewBox="0 0 12 12" fill="none" aria-hidden="true">
              <path d="M2 4l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <div class="section-body"><div class="section-body-inner">
            <div id="appearance-preview" class="appearance-preview"></div>
            <div id="appearance-name" class="appearance-name"></div>
            <button id="change-background" class="change-bg-btn" type="button">Change Background</button>
          </div></div>
        </section>

        <section class="settings-section" data-section="font">
          <button class="section-toggle" type="button" aria-expanded="true">
            <span>Font</span>
            <svg class="chevron" width="12" height="12" viewBox="0 0 12 12" fill="none" aria-hidden="true">
              <path d="M2 4l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <div class="section-body"><div class="section-body-inner">
            <div id="font-picker"></div>
          </div></div>
        </section>

        <section class="settings-section" data-section="display">
          <button class="section-toggle" type="button" aria-expanded="true">
            <span>Display</span>
            <svg class="chevron" width="12" height="12" viewBox="0 0 12 12" fill="none" aria-hidden="true">
              <path d="M2 4l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <div class="section-body"><div class="section-body-inner">
            <div class="setting-row">
              <span>Header</span>
              <div class="button-group" role="group" aria-label="Header content">
                <button class="layout-btn" data-value="logo" type="button">Logo</button>
                <button class="layout-btn" data-value="time" type="button">Time</button>
                <button class="layout-btn" data-value="date" type="button">Date</button>
              </div>
            </div>
            <div id="time-sub-settings">
              <label class="setting-row">
                <span>12-hour</span>
                <input type="checkbox" id="setting-12h">
              </label>
              <label class="setting-row">
                <span>Seconds</span>
                <input type="checkbox" id="setting-seconds">
              </label>
              <label class="setting-row">
                <span>Date below</span>
                <input type="checkbox" id="setting-date">
              </label>
            </div>
            <div id="date-sub-settings">
              <label class="setting-row">
                <span>Time below</span>
                <input type="checkbox" id="setting-time-in-date">
              </label>
            </div>
            <label class="setting-row">
              <span>Hide text</span>
              <input type="checkbox" id="setting-hide-text">
            </label>
            <label class="setting-row">
              <span>Hide search bar</span>
              <input type="checkbox" id="setting-hide-search">
            </label>
          </div></div>
        </section>

        <section class="settings-section" data-section="quicklinks">
          <button class="section-toggle" type="button" aria-expanded="true">
            <span>Quick Links <span class="settings-hint">(up to 6)</span></span>
            <svg class="chevron" width="12" height="12" viewBox="0 0 12 12" fill="none" aria-hidden="true">
              <path d="M2 4l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <div class="section-body"><div class="section-body-inner">
            <label class="setting-row">
              <span>Use Theme Color</span>
              <input type="checkbox" id="setting-brand-colors">
            </label>
            <div id="quick-links-editor"></div>
            <button id="add-quick-link" type="button" class="add-btn">+ Add link</button>
          </div></div>
        </section>

        <section class="settings-section" data-section="animation">
          <button class="section-toggle" type="button" aria-expanded="true">
            <span>Animation</span>
            <svg class="chevron" width="12" height="12" viewBox="0 0 12 12" fill="none" aria-hidden="true">
              <path d="M2 4l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <div class="section-body"><div class="section-body-inner">
            <div class="setting-row">
              <span>Intensity &amp; Quality</span>
              <div class="button-group" role="group" aria-label="Animation intensity and render quality">
                <button class="intensity-btn" data-value="low"    type="button">Low</button>
                <button class="intensity-btn" data-value="medium" type="button">Medium</button>
                <button class="intensity-btn" data-value="high"   type="button">High</button>
              </div>
            </div>
            <div class="setting-row">
              <span>Speed</span>
              <div class="speed-control">
                <input type="range" id="setting-speed" min="0.25" max="2" step="0.05" value="1" aria-label="Animation speed">
                <span id="speed-label" class="speed-label">1×</span>
              </div>
            </div>
            <label class="setting-row">
              <span>Static mode <span class="settings-hint">(no animation)</span></span>
              <input type="checkbox" id="setting-static">
            </label>
          </div></div>
        </section>

      </div>
      </div>

      <div class="settings-view" id="view-categories" data-view="categories" aria-hidden="true">
        <div class="settings-header">
          <button class="back-btn" id="back-to-main" type="button" aria-label="Back to settings">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
              <path d="M10 3L5 8l5 5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <span class="settings-title">Backgrounds</span>
          <button class="settings-close" type="button" aria-label="Close settings">✕</button>
        </div>
        <div class="settings-body view-grid-body">
          <button class="theme-option randomize-daily-btn" id="randomize-all-daily" data-pool="all" type="button">
            <span class="rdaily-icon">↻</span><span>Randomize All Daily</span>
          </button>
          <div id="category-grid" class="category-grid"></div>
        </div>
      </div>

      <div class="settings-view" id="view-backgrounds" data-view="backgrounds" aria-hidden="true">
        <div class="settings-header">
          <button class="back-btn" id="back-to-categories" type="button" aria-label="Back to backgrounds">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
              <path d="M10 3L5 8l5 5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <span class="settings-title" id="backgrounds-title"></span>
          <button class="settings-close" type="button" aria-label="Close settings">✕</button>
        </div>
        <div class="settings-body view-grid-body">
          <div id="backgrounds-randomize"></div>
          <div id="background-grid" class="background-grid"></div>
          <p class="more-coming-soon">More Coming Soon!</p>
        </div>
      </div>

    </div>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/brandColors.js"></script>
  <script src="js/scenePreview.js"></script>
  <script src="js/themes/engine.js"></script>
  <script src="js/themes/starfield.js"></script>
  <script src="js/themes/nebula.js"></script>
  <script src="js/themes/galaxy.js"></script>
  <script src="js/themes/particles.js"></script>
  <script src="js/themes/hyperspace.js"></script>
  <script src="js/themes/meteor.js"></script>
  <script src="js/themes/blackhole.js"></script>
  <script src="js/themes/sakura.js"></script>
  <script src="js/themes/fireflies.js"></script>
  <script src="js/themes/bokeh.js"></script>
  <script src="js/themes/snow.js"></script>
  <script src="js/themes/bikeRide.js"></script>
  <script src="js/themes/dogWalk.js"></script>
  <script src="js/themes/cityDrive.js"></script>
  <script src="js/themes/hotAirBalloon.js"></script>
  <script src="js/themes/rainyWindow.js"></script>
  <script src="js/themes/lanterns.js"></script>
  <script src="js/themes/fireside.js"></script>
  <script src="js/themes/nightTrain.js"></script>
  <script src="js/themes/oceanLight.js"></script>
  <script src="js/themes/goldenHour.js"></script>
  <script src="js/themes/windmillRainbowField.js"></script>
  <script src="js/newtab.js"></script>
</body>
</html>
